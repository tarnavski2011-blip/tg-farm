<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Farm Clicker</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #0f172a, #1e293b);
        color: #fff;
      }

      .app {
        max-width: 480px;
        margin: auto;
        padding: 16px;
      }

      .title {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 16px;
      }

      .menu {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .btn {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 16px;
        text-align: center;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn:active {
        transform: scale(0.95);
      }

      /* MODAL */

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: flex-end;
        z-index: 100;
      }

      .modal-content {
        width: 100%;
        max-width: 480px;
        background: #0f172a;
        border-radius: 20px 20px 0 0;
        padding: 16px;
        animation: up 0.2s ease;
      }

      @keyframes up {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }

      .modal-title {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 12px;
      }

      .close {
        float: right;
        cursor: pointer;
        font-size: 18px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        border-radius: 12px;
        background: #1e293b;
        cursor: pointer;
      }

      .tab.active {
        background: #2563eb;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .card {
        background: #1e293b;
        border-radius: 14px;
        padding: 12px;
        text-align: center;
      }

      .buy-btn {
        margin-top: 8px;
        padding: 8px;
        background: #2563eb;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="title">🚜 My Farm Clicker</div>

      <div class="menu">
        <div class="btn" onclick="openModal('animals')">🐔<br />Тварини</div>
        <div class="btn" onclick="openModal('storage')">📦<br />Склад</div>
        <div class="btn" onclick="openModal('daily')">🎁<br />Daily</div>
        <div class="btn" onclick="openModal('quests')">📜<br />Квести</div>
        <div class="btn" onclick="openModal('wheel')">🎰<br />Wheel</div>
        <div class="btn" onclick="openModal('shop')">🛒<br />Shop</div>
        <div class="btn" onclick="openModal('boost')">⚡<br />Boosters</div>
        <div class="btn" onclick="openModal('refs')">👥<br />Referrals</div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <div>
          <span class="modal-title" id="modalTitle"></span>
          <span class="close" onclick="closeModal()">✖</span>
        </div>

        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      const modal = document.getElementById("modal");
      const modalTitle = document.getElementById("modalTitle");
      const modalBody = document.getElementById("modalBody");

      function openModal(type) {
        modal.style.display = "flex";

        if (type === "animals") {
          modalTitle.innerText = "🐾 Тварини";

          modalBody.innerHTML = `
      <div class="tabs">
        <div class="tab active" onclick="showTab('buy')">Купити</div>
        <div class="tab" onclick="showTab('owned')">Мої</div>
      </div>

      <div id="tabContent"></div>
    `;

          showTab("buy");
        } else if (type === "storage") {
          modalTitle.innerText = "📦 Склад";
          modalBody.innerHTML = `
      <div class="grid">
        <div class="card">Яйця<br>0</div>
        <div class="card">Шерсть<br>0</div>
        <div class="card">Молоко<br>0</div>
        <div class="card">Capacity<br>0/1000</div>
      </div>
    `;
        } else {
          modalTitle.innerText = type;
          modalBody.innerHTML = `<div class="card">В розробці 🚧</div>`;
        }
      }

      function closeModal() {
        modal.style.display = "none";
      }

      function showTab(tab) {
        const tabs = document.querySelectorAll(".tab");
        tabs.forEach((t) => t.classList.remove("active"));

        if (tab === "buy") tabs[0].classList.add("active");
        if (tab === "owned") tabs[1].classList.add("active");

        const content = document.getElementById("tabContent");

        if (tab === "buy") {
          content.innerHTML = `
      <div class="grid">
        <div class="card">🐔 Курка<br><div class="buy-btn">Купити</div></div>
        <div class="card">🐑 Вівця<br><div class="buy-btn">Купити</div></div>
        <div class="card">🐄 Корова<br><div class="buy-btn">Купити</div></div>
      </div>
    `;
        }

        if (tab === "owned") {
          content.innerHTML = `
      <div class="grid">
        <div class="card">🐔 Курки<br>0</div>
        <div class="card">🐑 Вівці<br>0</div>
        <div class="card">🐄 Корови<br>0</div>
      </div>
    `;
        }
      }
    </script>
  </body>
</html>
