<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
      }

      .app {
        max-width: 480px;
        margin: auto;
        padding: 14px;
      }

      /* ГОЛОВНИЙ БЛОК */
      .card {
        background: #1e293b;
        border-radius: 20px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      /* СТАТИСТИКА */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .stat-box {
        background: #334155;
        border-radius: 16px;
        padding: 12px;
        text-align: center;
      }

      .stat-label {
        font-size: 12px;
        opacity: 0.7;
      }

      .stat-value {
        font-size: 18px;
        font-weight: bold;
      }

      /* BOOST */
      #boostStatus {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        opacity: 0.9;
      }

      /* TAP */
      .tap-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 0;
      }

      .tap-btn {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        font-size: 32px;
        font-weight: bold;
        color: white;
        background: radial-gradient(circle, #60a5fa, #2563eb);
        box-shadow: 0 20px 40px rgba(37, 99, 235, 0.4);
      }

      .tap-btn:active {
        transform: scale(0.95);
      }

      /* МЕНЮ */
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .menu-btn {
        background: #334155;
        border-radius: 16px;
        padding: 14px;
        text-align: center;
        font-size: 14px;
        font-weight: bold;
      }

      .menu-btn span {
        display: block;
        margin-top: 6px;
      }

      /* КНОПКА */
      .main-btn {
        width: 100%;
        padding: 16px;
        border-radius: 16px;
        border: none;
        font-weight: bold;
        font-size: 16px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        margin-top: 12px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="card">
        <div class="stats">
          <div class="stat">Coins<br /><span id="coins">0</span></div>
          <div class="stat">Diamonds<br /><span id="diamonds">0</span></div>
          <div class="stat">Points<br /><span id="points">0</span></div>
          <div class="stat">XP<br /><span id="xp">0</span></div>
        </div>

        <div id="boostStatus">⚡ OFF | 🤖 OFF | 👑 OFF</div>
      </div>

      <div class="card">
        <div class="tap" id="tapBtn">TAP</div>
      </div>

      <div class="card">
        <div class="menu">
          <button id="animalsBtn">🐔</button>
          <button id="storageBtn">📦</button>
          <button id="labBtn">🧪</button>
          <button id="boostBtn">⚡</button>
          <button id="dailyBtn">🎁</button>
          <button id="questsBtn">📜</button>
          <button id="wheelBtn">🎰</button>
          <button id="shopBtn">🛒</button>
          <button id="refsBtn">👥</button>
        </div>
      </div>
    </div>

    <div class="modal" id="modal"></div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();

      const API = "https://tg-farm-api.onrender.com/api";
      const initData = tg.initData;

      const modal = document.getElementById("modal");

      function openModal(html) {
        modal.innerHTML =
          html + '<br><button onclick="closeModal()">Закрити</button>';
        modal.style.display = "block";
      }

      function closeModal() {
        modal.style.display = "none";
      }

      async function api(path) {
        const res = await fetch(API + path, {
          method: "GET",
          headers: { "x-telegram-init-data": initData },
        });
        return await res.json();
      }

      async function apiPost(path, body = {}) {
        const res = await fetch(API + path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-telegram-init-data": initData,
          },
          body: JSON.stringify(body),
        });
        return await res.json();
      }

      async function load() {
        const data = await api("/state");

        coins.innerText = data.coins;
        diamonds.innerText = data.diamonds;
        points.innerText = data.points;
        xp.innerText = data.xp;

        boostStatus.innerText =
          "⚡ " +
          (data.boost.active ? "ON" : "OFF") +
          " | 🤖 " +
          (data.autoCollect.active ? "ON" : "OFF") +
          " | 👑 " +
          (data.vip.active ? "ON" : "OFF");
      }

      tapBtn.onclick = async () => {
        await apiPost("/collect");
        load();
      };

      animalsBtn.onclick = () => {
        openModal(`
    <h3>🐔 Тварини</h3>
    <button onclick="buy('CHICKEN')">Курка</button>
    <button onclick="buy('SHEEP')">Вівця</button>
    <button onclick="buy('COW')">Корова</button>
  `);
      };

      async function buy(type) {
        await apiPost("/buy-animal", { type });
        load();
      }

      storageBtn.onclick = () => {
        openModal(
          `<h3>📦 Склад</h3><button onclick="sell()">Продати все</button>`,
        );
      };

      async function sell() {
        await apiPost("/sell");
        load();
      }

      boostBtn.onclick = () => {
        openModal(`
    <h3>⚡ Boosters</h3>
    <button onclick="boost()">Boost x2</button>
    <button onclick="auto()">Auto</button>
  `);
      };

      async function boost() {
        await apiPost("/boost/boost");
        load();
      }

      async function auto() {
        await apiPost("/boost/auto");
        load();
      }

      labBtn.onclick = async () => {
        const data = await api("/lab");

        openModal(`
    <h3>🧪 Лабораторія</h3>
    Рівень: ${data.level}<br>
    Множник: x${data.multiplier}<br>
    Ціна: ${data.nextCost}<br>
    <button onclick="upgradeLab()">Upgrade</button>
  `);
      };

      async function upgradeLab() {
        await apiPost("/lab/upgrade");
        load();
      }

      dailyBtn.onclick = () => openModal("🎁 Daily скоро");
      questsBtn.onclick = () => openModal("📜 Квести скоро");
      wheelBtn.onclick = () => openModal("🎰 Wheel скоро");
      shopBtn.onclick = () => openModal("🛒 Shop скоро");
      refsBtn.onclick = () => openModal("👥 Referrals скоро");

      load();
    </script>
  </body>
</html>
