<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Farm Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f4f7f1;
        color: #1f2937;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .muted {
        color: #6b7280;
      }
      .box {
        margin-top: 16px;
        padding: 12px;
        border-radius: 12px;
        background: #f9fafb;
        word-break: break-word;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 16px;
        cursor: pointer;
        background: #16a34a;
        color: white;
      }
      pre {
        white-space: pre-wrap;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🚜 My Farm Clicker</h1>
      <p class="muted">Тестова Telegram Mini App</p>

      <div class="box">
        <strong>Telegram user:</strong>
        <div id="user">завантаження...</div>
      </div>

      <div class="box">
        <strong>initData:</strong>
        <pre id="initData">завантаження...</pre>
      </div>

      <button id="sendBtn">Надіслати на сервер</button>

      <div class="box">
        <strong>Відповідь сервера:</strong>
        <pre id="result">ще нічого</pre>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      const userEl = document.getElementById("user");
      const initDataEl = document.getElementById("initData");
      const resultEl = document.getElementById("result");
      const sendBtn = document.getElementById("sendBtn");

      if (tg) {
        tg.expand();
        tg.ready();
      }

      const user = tg?.initDataUnsafe?.user ?? null;
      const initData = tg?.initData ?? "";

      userEl.textContent = user
        ? `${user.first_name || ""} ${user.last_name || ""} | id: ${user.id}`
        : "Користувача не знайдено";

      initDataEl.textContent = initData || "Порожньо";

      sendBtn.addEventListener("click", async () => {
        try {
          const res = await fetch(
            "https://tg-farm-api.onrender.com/api/state",
            {
              method: "GET",
              headers: {
                Authorization: `tma ${initData}`,
              },
            },
          );

          const text = await res.text();
          resultEl.textContent = text;
        } catch (e) {
          resultEl.textContent = String(e);
        }
      });
    </script>
  </body>
</html>
